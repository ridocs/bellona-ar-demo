<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Bellona · Berjeri Odanda Gör</title>
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<style>
:root{--bellona:#c8102e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f4f4f5;color:#18181b;min-height:100vh;display:flex;flex-direction:column}
header{background:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e4e4e7}
header .logo{font-weight:800;letter-spacing:1px;color:var(--bellona);font-size:20px}
header .sub{font-size:13px;color:#71717a}
.wrap{flex:1;display:flex;flex-direction:column;padding:16px;gap:14px;max-width:720px;margin:0 auto;width:100%}
model-viewer{width:100%;height:60vh;min-height:360px;background:linear-gradient(#fafafa,#ececee);border-radius:16px;--poster-color:#ececee}
.card{background:#fff;border-radius:16px;padding:16px 18px;border:1px solid #e4e4e7}
.title{font-size:18px;font-weight:700;margin-bottom:4px}
.desc{font-size:14px;color:#71717a}
.dims{font-size:14px;color:#52525b;margin-top:8px}
.dims b{color:#18181b}
.arbtn{background:var(--bellona);color:#fff;border:none;border-radius:12px;padding:14px 20px;font-size:16px;font-weight:700;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;box-shadow:0 4px 14px rgba(200,16,46,.3)}
.hint{font-size:12px;color:#a1a1aa;text-align:center;margin-top:4px}
.err{display:none;background:#fef2f2;color:#b91c1c;padding:10px;border-radius:10px;font-size:13px;margin-top:8px}
</style>
</head>
<body>
<header>
  <span class="logo">BELLONA</span>
  <span class="sub">Berjeri odanda gör</span>
</header>
<div class="wrap">
  <model-viewer id="mv"
    src="https://litter.catbox.moe/fdggzi.glb"
    ios-src="https://litter.catbox.moe/urd6z8.usdz"
    alt="Bellona Bouclé Berjer"
    camera-controls auto-rotate shadow-intensity="1"
    ar ar-modes="webxr scene-viewer quick-look" ar-scale="fixed"
    exposure="1.05">
    <button slot="ar-button" class="arbtn">📱 AR'da göster — gerçek boyutta</button>
  </model-viewer>
  <div class="card">
    <div class="title">Bouclé Berjer</div>
    <div class="desc">Gerçek boyutta odanda dene, satın almadan önce nasıl durduğunu gör.</div>
    <div class="dims" id="dims">Ölçüler yükleniyor…</div>
    <div class="err" id="err"></div>
  </div>
  <div class="hint">iPhone/iPad → Safari · Android → Chrome ile açın</div>
</div>
<script type="module">
const mv=document.getElementById('mv');
const dims=document.getElementById('dims');
const err=document.getElementById('err');
mv.addEventListener('load', async ()=>{
  try{
    const d=await mv.getDimensions();
    const w=Math.round(d.x*100),h=Math.round(d.y*100),dp=Math.round(d.z*100);
    dims.innerHTML='Genişlik <b>'+w+' cm</b> · Yükseklik <b>'+h+' cm</b> · Derinlik <b>'+dp+' cm</b>';
  }catch(e){ dims.textContent=''; }
});
mv.addEventListener('error',(e)=>{ err.style.display='block'; err.textContent='Model yüklenemedi.'; });
mv.addEventListener('ar-status',(e)=>{ if(e.detail.status==='failed'){ err.style.display='block'; err.textContent="AR başlatılamadı. iPhone'da Safari, Android'de Chrome deneyin."; } });
</script>
</body>
</html>
